<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" id="favicon" href="/instalogo-siyah.png" />
    <script>
      (function() {
        function updateFavicon(dark) {
          var el = document.getElementById('favicon');
          if (el) el.href = dark ? '/instalogo-beyaz.png' : '/instalogo-siyah.png';
        }
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        updateFavicon(mq.matches);
        mq.addEventListener('change', function(e) { updateFavicon(e.matches); });
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAVEK | Havacılık Eğitim Ekipmanları</title>
    <script>
      // GitHub Pages SPA redirect handler
      (function() {
        var qs = window.location.search;
        if (qs.indexOf('?p=/') === 0 || qs.indexOf('p=/') !== -1) {
          var params = qs.slice(1).split('&').reduce(function(p, s) {
            var r = s.split('='); p[r[0]] = r.slice(1).join('=').replace(/~and~/g, '&'); return p;
          }, {});
          if (params.p) {
            window.history.replaceState(null, null,
              window.location.pathname.split('/').slice(0, 2).join('/') + params.p +
              (params.q ? '?' + params.q : '') + window.location.hash
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
