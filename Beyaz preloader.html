<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Giriş Animasyonu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Scroll bar çıkmasın diye overflow gizliyoruz */
            overflow: hidden;
        }

        /* 1) ARKAPLANDAKİ ASIL SİTE İÇERİĞİ */
        .main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Temsili yüksek kaliteli bir ofis/masaüstü fotoğrafı */
            background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center;
            background-size: cover;
            
            /* İçeriği ortalamak için flex kullanıyoruz */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
            z-index: 1; /* En altta duracak katman */
        }

        .main-content h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .main-content p {
            font-size: 1.2rem;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 8px;
        }

        /* 2) LOGO AÇILIŞ EKRANI (Splash Screen Katmanı) */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Giriş ekranı zeminini ferah ve opak beyaz yapıyoruz ki arkadaki resim başta gözükmesin */
            background-color: #ffffff; 
            z-index: 9999; /* En üstte duracak katman */
            
            /* Logo animasyonu 3.5 saniye sürüyor. 4. saniyede de kendi fade-out (karararak yok olma) animasyonuna başlayacak */
            animation: fadeOutSplash 1.5s ease-in-out 4s forwards;
            
            /* Görünmez olduktan sonra fare tıklamalarını engellemesin diye pointer-events kapatıyoruz */
            pointer-events: none;
        }

        /* Splash Screen Yok Olma Animasyonu */
        @keyframes fadeOutSplash {
            0% {
                opacity: 1;
                visibility: visible;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        .logo-container {
            width: 80%;
            max-width: 500px; /* Logoyu ekranda çok devasa durmasın diye hafif küçültebiliriz */
        }

        .animated-logo {
            width: 100%;
            height: auto;
        }

        /* LOGO ÇİZİM ANİMASYONU KURALLARI */
        .animated-logo path {
            fill: transparent;
            /* Çizgiler siyah */
            stroke: #000000; 
            stroke-width: 4;
            
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            
            /* Animasyon sırası: Önce çizim (2s), sonra içini boyama (1.5s) */
            animation: 
                draw 2s ease-in-out forwards,
                fillColor 1.5s ease-in-out 2s forwards;
        }

        /* Her harfe küçük bir gecikme (<path> sırasına göre) */
        .animated-logo path:nth-child(1) { animation-delay: 0.0s, 2s; }
        .animated-logo path:nth-child(2) { animation-delay: 0.3s, 2.3s; }
        .animated-logo path:nth-child(3) { animation-delay: 0.6s, 2.6s; }
        .animated-logo path:nth-child(4) { animation-delay: 0.9s, 2.9s; }
        .animated-logo path:nth-child(5) { animation-delay: 1.2s, 3.2s; }

        @keyframes draw {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes fillColor {
            0% { fill: transparent; }
            100% {
                fill: #000000; 
                stroke: transparent;
            }
        }
    </style>
</head>
<body>

    <!-- Arkaplandaki Sitenin Kendisi -->
    <div class="main-content">
        <h1>Hoş Geldiniz</h1>
        <p>Giriş animasyonu tamamlandı ve site açıldı!</p>
    </div>

    <!-- Gelişmiş Açılış Ekranı ve Logo Animasyonu -->
    <div class="splash-screen">
        <div class="logo-container">
            <svg class="animated-logo" id="katman_1" data-name="katman 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">

            </svg>
        </div>
    </div>

</body>
</html>
